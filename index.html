<!DOCTYPE html>
<html>
<head>
    <title>Alternative Method</title>
</head>
<body style="background: black;">

    <button id="btn" onclick="openPopup()">Open</button>

    <script>
        function openPopup() {
            // Opens a clean, minimal browser popup window
            window.open("", "viewer", "width=450,height=350,menubar=no,toolbar=no");
            
            // Hides the button on the main screen, leaving it black
            document.getElementById("btn").style.style.display = "none";
        }
    </script>

</body>
</html>
