<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Gem Chat PiP (with Multi-Key Fallback)</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],

                processHtmlClass: 'tex2jax_process'
            }

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background-color: #121214;
            color: #e3e3e3;
            position: relative;
        }

        /* Wrap everything in a main container for easy visibility toggling */
        #main-app-container {
            transition: opacity 0.15s ease, transform 0.15s ease;
            opacity: 1;
            transform: scale(1);
        }

        /* Class applied when the UI is hidden */
        .hidden-ui {
            opacity: 0 !important;
            transform: scale(0.95) !important;
            pointer-events: none; 
            user-select: none;
        }

        /* Low-profile floating button to reveal the UI when hidden */
        #floating-reveal-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            background-color: #2e2e34;
            color: #a1a1aa;
            border: 1px solid #3f3f46;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        #floating-reveal-btn:hover {
            color: #ffffff;
            background-color: #2563eb;
            border-color: #3b82f6;
        }
        /* Show the floating button only when the main app is hidden */
        .hidden-ui ~ #floating-reveal-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .header-panel {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        h2 {
            font-weight: 600;
            color: #ffffff;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .pip-trigger-btn {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .pip-trigger-btn:hover {
            background-color: #1ed760;
            transform: scale(1.05);
        }
        .hide-btn {
            background-color: #3f3f46;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .hide-btn:hover {
            background-color: #52525b;
            transform: scale(1.05);
        }

        /* --- Multi-Key Config Box --- */
        .config-box {
            background: #1a1a1e;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2e2e34;
            margin-bottom: 20px;
        }
        .config-box label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #b0b0b5;
        }
        .key-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .key-input-group input {
            flex-grow: 1;
            padding: 10px;
            background-color: #26262b;
            border: 1px solid #3f3f46;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
        }
        .key-input-group button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .key-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .key-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #26262b;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: monospace;
            border: 1px solid #3f3f46;
        }
        .key-item .badge {
            background-color: #3f3f46;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 6px;
        }
        .key-item .badge.primary {
            background-color: #1DB954;
            color: black;
            font-weight: bold;
        }
        .key-item button {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        /* --- Main Chat UI --- */
        #chat-ui-wrapper {
            background: #1a1a1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2e2e34;
            display: flex;
            flex-direction: column;
            height: 450px;
        }

        #chat-container {
            flex-grow: 1;
            border: 1px solid #2e2e34;
            background: #121214;
            padding: 15px;
            overflow-y: auto;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
            position: relative;
        }
        .user-message {
            background-color: #2563eb;
            color: #ffffff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background-color: #2e2e34;
            color: #e3e3e3;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            padding-bottom: 38px;
        }
        
        .msg-actions {
            position: absolute;
            bottom: 6px;
            left: 12px;
            display: flex;
            gap: 8px;
        }
        .action-btn {
            background: #1a1a1e;
            border: 1px solid #3f3f46;
            color: #a1a1aa;
            padding: 3px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
        }
        .action-btn:hover {
            color: #ffffff;
            border-color: #3b82f6;
            background: #2563eb;
        }

        .system-message {
            background-color: transparent;
            color: #ef4444;
            margin: 10px auto;
            text-align: center;
            font-size: 13px;
            border-radius: 0;
            max-width: 100%;
        }

        .fallback-warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px dashed #f59e0b;
            font-size: 12px;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex-grow: 1;
            padding: 14px;
            background-color: #121214;
            border: 1px solid #2e2e34;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
        }
        .input-area button {
            padding: 0 24px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="main-app-container">
        <div class="header-panel">
            <h2>Interactive Gem Chat</h2>
            <div class="btn-group">
                <button id="pip-button" class="pip-trigger-btn">Pop Out Chat Player</button>
                <button id="hide-ui-btn" class="hide-btn">Hide Interface (`)</button>
            </div>
        </div>

        <div class="config-box">
            <label for="newApiKey">Gemini API Keys (Saved locally)</label>
            <div class="key-input-group">
                <input type="password" id="newApiKey" placeholder="Add a new AIzaSy... key">
                <button id="addKeyBtn">Add Key</button>
            </div>
            <ul id="keyList" class="key-list"></ul>
        </div>

        <div id="chat-ui-wrapper" class="tex2jax_process">
            <div id="chat-container"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type a message...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <button id="floating-reveal-btn">Show Chat (`)</button>

    <script type="importmap">

        "imports": {
          "@google/genai": "https://esm.run/@google/genai"
        }
      }
    </script>
