<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg-base: #121214;
            --bg-surface: #1a1a1e;
            --bg-element: #26262b;
            --border-color: #2e2e34;
            --border-focus: #3f3f46;
            --text-main: #e3e3e3;
            --text-muted: #a1a1aa;
            --accent-blue: #2563eb;
            --accent-blue-hover: #3b82f6;
            --accent-green: #1db954;
            --accent-green-hover: #1ed760;
            --accent-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-base);
            color: var(--text-main);
            position: relative;
        }

        #main-app-container {
            display: block;
        }

        .header-panel {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            border: none;
        }

        .pip-trigger-btn {
            background-color: var(--accent-green);
            color: white;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
        }
        .pip-trigger-btn:hover {
            background-color: var(--accent-green-hover);
            transform: scale(1.05);
        }

        .config-box {
            background: var(--bg-surface);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .key-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .key-input-group input {
            flex-grow: 1;
            padding: 10px;
            background-color: var(--bg-element);
            border: 1px solid var(--border-focus);
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
        }
        .key-input-group button {
            background-color: var(--accent-blue);
            color: white;
            padding: 0 15px;
            border-radius: 6px;
            font-weight: bold;
        }
        .key-input-group button:hover {
            background-color: var(--accent-blue-hover);
        }

        .key-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .key-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-element);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: monospace;
            border: 1px solid var(--border-focus);
        }
        .key-item .badge {
            background-color: var(--border-focus);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 6px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
        .key-item .badge.primary {
            background-color: var(--accent-green);
            color: black;
            font-weight: bold;
        }
        .key-item button {
            background: transparent;
            color: var(--accent-red);
            font-size: 12px;
            font-weight: bold;
        }

        #chat-window-container {
            background: var(--bg-surface);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 450px;
            transition: all 0.1s ease-in-out;
            transform-origin: top left;
        }

        .pip-minimized-ui {
            padding: 0 !important;
            height: 0px !important;
            width: 0px !important;
            border: none !important;
            background: transparent !important;
            overflow: hidden !important;
        }
        .pip-minimized-ui #chat-messages-box,
        .pip-minimized-ui .input-area {
            display: none !important;
        }

        #chat-messages-box {
            flex-grow: 1;
            border: 1px solid var(--border-color);
            background: var(--bg-base);
            padding: 15px;
            overflow-y: auto;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .message-bubble {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
            position: relative;
        }
        .user-message {
            background-color: var(--accent-blue);
            color: #ffffff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background-color: var(--border-color);
            color: var(--text-main);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            padding-bottom: 38px;
        }
        
        .msg-actions {
            position: absolute;
            bottom: 6px;
            left: 12px;
            display: flex;
            gap: 8px;
        }
        .action-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border-focus);
            color: var(--text-muted);
            padding: 3px 8px;
            font-size: 11px;
            border-radius: 4px;
        }
        .action-btn:hover {
            color: #ffffff;
            border-color: var(--accent-blue-hover);
            background: var(--accent-blue);
        }

        .system-message {
            background-color: transparent;
            color: var(--accent-red);
            margin: 10px auto;
            text-align: center;
            font-size: 13px;
            border-radius: 0;
            max-width: 100%;
        }

        .fallback-warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px dashed #f59e0b;
            font-size: 12px;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex-grow: 1;
            padding: 14px;
            background-color: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
        }
        .input-area button {
            padding: 0 24px;
            background-color: var(--accent-blue);
            color: white;
            border-radius: 8px;
            font-weight: 500;
        }
        .input-area button:hover {
            background-color: var(--accent-blue-hover);
        }
    </style>
</head>
<body>

    <div id="main-app-container">
        <div class="header-panel">
            <div class="btn-group">
                <button id="pip-button" class="pip-trigger-btn">⧉</button>
            </div>
        </div>

        <div class="config-box">
            <div class="key-input-group">
                <input type="password" id="newApiKey" placeholder="AIzaSy...">
                <button id="addKeyBtn">+</button>
            </div>
            <ul id="keyList" class="key-list"></ul>
        </div>

        <div id="chat-window-container" class="tex2jax_process">
            <div id="chat-messages-box"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="...">
                <button id="sendBtn">➔</button>
            </div>
        </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.run/@google/genai"
        }
      }
    </script>

    <script type="module">
        import { GoogleGenAI } from '@google/genai';

        const mainAppContainer = document.getElementById('main-app-container');
        const chatWindowContainer = document.getElementById('chat-window-container');
        const pipButton = document.getElementById('pip-button');
        const newApiKeyInput = document.getElementById('newApiKey');
        const addKeyBtn = document.getElementById('addKeyBtn');
        const keyListContainer = document.getElementById('keyList');
        
        let userInputField = document.getElementById('userInput');
        let sendMsgBtn = document.getElementById('sendBtn');
        let chatMessagesBox = document.getElementById('chat-messages-box');

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
                if (e.key === 'Escape') {
                    document.activeElement.blur();
                }
            }
        });

        let savedApiKeys = JSON.parse(localStorage.getItem('gemini_api_keys')) || [];

        function updateStorageAndList() {
            localStorage.setItem('gemini_api_keys', JSON.stringify(savedApiKeys));
            renderKeyList();
        }

        function renderKeyList() {
            keyListContainer.innerHTML = '';
            if (savedApiKeys.length === 0) {
                return;
            }
            savedApiKeys.forEach((key, index) => {
                const li = document.createElement('li');
                li.className = 'key-item';
                
                const maskedKey = key.substring(0, 8) + '...' + key.substring(key.length - 4);
                const badgeText = index === 0 ? '<span class="badge primary">★</span>' : `<span class="badge">#${index}</span>`;
                
                li.innerHTML = `
                    <div>${maskedKey} ${badgeText}</div>
                    <button data-index="${index}" class="delete-key-btn">✕</button>
                `;
                keyListContainer.appendChild(li);
            });
        }

        addKeyBtn.onclick = () => {
            const keyVal = newApiKeyInput.value.trim();
            if (keyVal) {
                if (!savedApiKeys.includes(keyVal)) {
                    savedApiKeys.push(keyVal);
                    updateStorageAndList();
                    newApiKeyInput.value = '';
                } else {
                    alert("Key exists");
                }
            }
        };

        keyListContainer.onclick = (e) => {
            if (e.target.classList.contains('delete-key-btn')) {
                const indexToRemove = parseInt(e.target.getAttribute('data-index'));
                savedApiKeys.splice(indexToRemove, 1);
                updateStorageAndList();
            }
        };

        renderKeyList();

        function bindInputEvents(inputEl, btnEl) {
            inputEl.onkeypress = (e) => { if(e.key === 'Enter') handleMessageSubmit(); };
            btnEl.onclick = () => { handleMessageSubmit(); };
        }
        bindInputEvents(userInputField, sendMsgBtn);

        pipButton.addEventListener('click', async () => {
            if (!('documentPictureInPicture' in window)) {
                alert("PiP not supported.");
                return;
            }

            try {
                const pipWindow = await window.documentPictureInPicture.requestWindow({
                    width: 450,
                    height: 500,
                });

                ([...document.styleSheets]).forEach((styleSheet) => {
                    try {
                        const cssSource = ([...styleSheet.cssRules]).map((rule) => rule.cssText).join('');
                        const style = document.createElement('style');
                        style.textContent = cssSource;
                        pipWindow.document.head.appendChild(style);
                    } catch (e) {}
                });

                pipWindow.document.body.appendChild(chatWindowContainer);

                userInputField = pipWindow.document.getElementById('userInput');
                sendMsgBtn = pipWindow.document.getElementById('sendBtn');
                chatMessagesBox = pipWindow.document.getElementById('chat-messages-box');
                bindInputEvents(userInputField, sendMsgBtn);

                let isMinimized = false;

                pipWindow.addEventListener('keydown', (e) => {
                    if (pipWindow.document.activeElement.tagName === 'INPUT' || pipWindow.document.activeElement.tagName === 'TEXTAREA') {
                        if (e.key === 'Escape') {
                            pipWindow.document.activeElement.blur();
                        }
                        return;
                    }

                    if (e.key === '`') {
                        e.preventDefault();
                        isMinimized = !isMinimized;

                        if (isMinimized) {
                            chatWindowContainer.classList.add('pip-minimized-ui');
                            pipWindow.resizeTo(100, 40);
                        } else {
                            pipWindow.resizeTo(450, 500);
                            chatWindowContainer.classList.remove('pip-minimized-ui');
                        }
                    }
                });

                pipWindow.addEventListener("pagehide", (event) => {
                    chatWindowContainer.classList.remove('pip-minimized-ui');
                    mainAppContainer.appendChild(chatWindowContainer);
                    userInputField = document.getElementById('userInput');
                    sendMsgBtn = document.getElementById('sendBtn');
                    chatMessagesBox = document.getElementById('chat-messages-box');
                    bindInputEvents(userInputField, sendMsgBtn);
                });

            } catch (error) {
                console.error("PiP failed: ", error);
            }
        });

        async function handleMessageSubmit() {
            const rawTxt = userInputField.value.trim();

            if (savedApiKeys.length === 0) {
                alert("Add key.");
                return;
            }
            if (!rawTxt) return;

            userInputField.value = '';
            userInputField.disabled = true;
            sendMsgBtn.disabled = true;

            appendMessageBubble(rawTxt, 'user-message');

            let success = false;
            
            for (let i = 0; i < savedApiKeys.length; i++) {
                const activeKey = savedApiKeys[i];
                
                try {
                    if (i > 0) {
                        appendNotificationBubble("Fallback #" + i + "...", 'fallback-warning');
                    }

                    const ai = new GoogleGenAI({ apiKey: activeKey });
                    
                    const response = await ai.models.generateContent({
                        model: 'gemini-2.5-flash',
                        contents: rawTxt,
                    });

                    appendMessageBubble(response.text, 'ai-message', true);
                    success = true;
                    break;
                    
                } catch (error) {
                    console.warn("Key position index " + i + " failed: ", error.message);
                    if (i === savedApiKeys.length - 1 && !success) {
                        appendMessageBubble("Error: " + error.message, 'system-message');
                    }
                }
            }

            userInputField.disabled = false;
            sendMsgBtn.disabled = false;
            userInputField.focus();
        }

        function appendNotificationBubble(text, className) {
            const notifyDiv = document.createElement('div');
            notifyDiv.className = className;
            notifyDiv.innerText = text;
            chatMessagesBox.appendChild(notifyDiv);
            chatMessagesBox.scrollTop = chatMessagesBox.scrollHeight;
        }

        function appendMessageBubble(text, className, isAI = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = "message-bubble " + className;
            messageDiv.innerText = text;

            if (isAI) {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'msg-actions';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-btn';
                copyBtn.innerText = '📋';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(text);
                    copyBtn.innerText = '✓';
                    setTimeout(() => copyBtn.innerText = '📋', 2000);
                };
                actionsDiv.appendChild(copyBtn);
                messageDiv.appendChild(actionsDiv);
            }

            chatMessagesBox.appendChild(messageDiv);
            chatMessagesBox.scrollTop = chatMessagesBox.scrollHeight;

            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([messageDiv]).catch((err) => console.log(err.message));
            }
        }
    </script>
</body>
</html>
