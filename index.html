<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Gem Chat PiP (Stealth Edition)</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@google/genai@0.1.1/dist/index.umd.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* Master application wrapper to allow total visibility toggle */
        #master-app-container {
            display: block; /* Toggled dynamically via JavaScript */
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121214;
            color: #e3e3e3;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #1a1a1e;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid #2e2e34;
        }
        h2 {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }
        
        .controls-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .pip-trigger-btn {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }
        .pip-trigger-btn:hover {
            background-color: #1ed760;
            transform: scale(1.03);
        }

        /* Large Action Stealth Toggle Buttons */
        .stealth-toggle-btn {
            background-color: #3f3f46;
            color: #e3e3e3;
            border: 1px solid #52525b;
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        .stealth-toggle-btn:hover {
            background-color: #52525b;
            color: #ffffff;
        }

        /* --- Collapsible Multi-Key Config Box --- */
        .config-box {
            display: block; /* Hidden dynamically via trigger */
            background: #1a1a1e;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2e2e34;
            margin-bottom: 20px;
        }
        .config-box label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #b0b0b5;
        }
        .key-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .key-input-group input {
            flex-grow: 1;
            padding: 10px;
            background-color: #26262b;
            border: 1px solid #3f3f46;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
        }
        .key-input-group input:focus {
            outline: none;
            border-color: #2563eb;
        }
        .key-input-group button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .key-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .key-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #26262b;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: monospace;
            border: 1px solid #3f3f46;
        }
        .key-item .badge {
            background-color: #3f3f46;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 6px;
        }
        .key-item .badge.primary {
            background-color: #1DB954;
            color: black;
            font-weight: bold;
        }
        .key-item button {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        /* --- Main UI Tree --- */
        #chat-ui-wrapper {
            background: #1a1a1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2e2e34;
            display: flex;
            flex-direction: column;
            height: 480px;
        }

        #chat-container {
            flex-grow: 1;
            border: 1px solid #2e2e34;
            background: #121214;
            padding: 15px;
            overflow-y: auto;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
            position: relative;
        }
        .user-message {
            background-color: #2563eb;
            color: #ffffff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background-color: #2e2e34;
            color: #e3e3e3;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            padding-bottom: 38px;
        }
        
        .msg-actions {
            position: absolute;
            bottom: 6px;
            left: 12px;
            display: flex;
            gap: 8px;
        }
        .action-btn {
            background: #1a1a1e;
            border: 1px solid #3f3f46;
            color: #a1a1aa;
            padding: 3px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
        }
        .action-btn:hover {
            color: #ffffff;
            border-color: #3b82f6;
            background: #2563eb;
        }

        .system-message {
            background-color: transparent;
            color: #ef4444;
            margin: 10px auto;
            text-align: center;
            font-size: 13px;
            border-radius: 0;
            max-width: 100%;
        }

        .fallback-warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px dashed #f59e0b;
            font-size: 12px;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex-grow: 1;
            padding: 14px;
            background-color: #121214;
            border: 1px solid #2e2e34;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
        }
        .input-area input:focus {
            outline: none;
            border-color: #2563eb;
        }
        .input-area button {
            padding: 0 24px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        /* Help prompt indicator for accessibility */
        .hotkey-hint {
            text-align: center;
            font-size: 11px;
            color: #71717a;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div id="master-app-container">

        <div class="header-panel">
            <h2>Gemini Chat Terminal</h2>
            <div class="controls-group">
                <button id="toggleConfigBtn" class="stealth-toggle-btn">⚙️ Toggle Config</button>
                <button id="pip-button" class="pip-trigger-btn">Pop Out Window</button>
            </div>
        </div>

        <div id="configBlock" class="config-box">
            <label for="newApiKey">Stored local keys:</label>
            <div class="key-input-group">
                <input type="password" id="newApiKey" placeholder="Add a new API key...">
                <button id="addKeyBtn">Add Key</button>
            </div>
            <ul id="keyList" class="key-list"></ul>
        </div>

        <div id="chat-ui-wrapper" class="tex2jax_process">
            <div id="chat-container"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Send prompt safely...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
        
        <div class="hotkey-hint">Press the Tilde key ( ~ ) at any time to instantly hide/show this terminal.</div>

    </div>

    <script>
        const { GoogleGenAI } = window.googleGenAI;

        const masterAppContainer = document.getElementById('master-app-container');
        const configBlock = document.getElementById('configBlock');
        const toggleConfigBtn = document.getElementById('toggleConfigBtn');
        
        const chatWrapper = document.getElementById('chat-ui-wrapper');
        const pipButton = document.getElementById('pip-button');
        const newApiKeyInput = document.getElementById('newApiKey');
        const addKeyBtn = document.getElementById('addKeyBtn');
        const keyListEl = document.getElementById('keyList');
        
        let currentInput = document.getElementById('userInput');
        let currentSendBtn = document.getElementById('sendBtn');
        let currentChatContainer = document.getElementById('chat-container');

        // --- 1. Key Binding / Hotkey Stealth Logic ---
        window.addEventListener('keydown', (event) => {
            // Check for Backquote / Tilde Key (~ or `)
            if (event.code === 'Backquote') {
                event.preventDefault(); // Stop the character from being typed in text boxes
                if (masterAppContainer.style.display === 'none') {
                    masterAppContainer.style.display = 'block';
                } else {
                    masterAppContainer.style.display = 'none';
                }
            }
        });

        // --- 2. Button Configurations ---
        toggleConfigBtn.onclick = () => {
            if (configBlock.style.display === 'none') {
                configBlock.style.display = 'block';
            } else {
                configBlock.style.display = 'none';
            }
        };

        // --- 3. Persistent API Key Framework ---
        let apiKeys = JSON.parse(localStorage.getItem('gemini_api_keys')) || [];

        function saveKeys() {
            localStorage.setItem('gemini_api_keys', JSON.stringify(apiKeys));
            renderKeyList();
        }

        function renderKeyList() {
            keyListEl.innerHTML = '';
            if (apiKeys.length === 0) {
                keyListEl.innerHTML = `<li style="font-size:12px; color:#a1a1aa; text-align:center;">No active keys found. Add one above.</li>`;
                return;
            }
            apiKeys.forEach((key, index) => {
                const li = document.createElement('li');
                li.className = 'key-item';
                const maskedKey = key.substring(0, 8) + '...' + key.substring(key.length - 4);
                const badgeText = index === 0 ? '<span class="badge primary">Primary</span>' : `<span class="badge">Fallback #${index}</span>`;
                
                li.innerHTML = `
                    <div>${maskedKey} ${badgeText}</div>
                    <button data-index="${index}" class="delete-key-btn">Remove</button>
                `;
                keyListEl.appendChild(li);
            });
        }

        addKeyBtn.onclick = () => {
            const keyVal = newApiKeyInput.value.trim();
            if (keyVal) {
                if (!apiKeys.includes(keyVal)) {
                    apiKeys.push(keyVal);
                    saveKeys();
                    newApiKeyInput.value = '';
                } else {
                    alert("Key already registered!");
                }
            }
        };

        keyListEl.onclick = (e) => {
            if (e.target.classList.contains('delete-key-btn')) {
                const indexToRemove = parseInt(e.target.getAttribute('data-index'));
                apiKeys.splice(indexToRemove, 1);
                saveKeys();
            }
        };

        renderKeyList();

        // --- 4. Event Routing Architecture ---
        function setupInputListeners(inputEl, btnEl) {
            inputEl.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
            btnEl.onclick = () => { sendMessage(); };
        }
        setupInputListeners(currentInput, currentSendBtn);

        // --- 5. Interactive Window Portals ---
        pipButton.addEventListener('click', async () => {
            if (!('documentPictureInPicture' in window)) {
                alert("Your browser environment does not support interactive pop-out screens.");
                return;
            }

            try {
                const pipWindow = await window.documentPictureInPicture.requestWindow({
                    width: 450,
                    height: 520,
                });

                [...document.styleSheets].forEach((styleSheet) => {
                    try {
                        const cssSource = [...styleSheet.cssRules].map((rule) => rule.cssText).join('');
                        const style = document.createElement('style');
                        style.textContent = cssSource;
                        pipWindow.document.head.appendChild(style);
                    } catch (e) {}
                });

                pipWindow.document.body.appendChild(chatWrapper);

                currentInput = pipWindow.document.getElementById('userInput');
                currentSendBtn = pipWindow.document.getElementById('sendBtn');
                currentChatContainer = pipWindow.document.getElementById('chat-container');
                setupInputListeners(currentInput, currentSendBtn);

                pipWindow.addEventListener("pagehide", (event) => {
                    masterAppContainer.appendChild(chatWrapper);
                    currentInput = document.getElementById('userInput');
                    currentSendBtn = document.getElementById('sendBtn');
                    currentChatContainer = document.getElementById('chat-container');
                    setupInputListeners(currentInput, currentSendBtn);
                });

            } catch (error) {
                console.error("Window allocation threw error: ", error);
            }
        });

        // --- 6. Core Processing Stream ---
        async function sendMessage() {
            const messageText = currentInput.value.trim();

            if (apiKeys.length === 0) {
                alert("Provide at least one active verification key first.");
                return;
            }
            if (!messageText) return;

            currentInput.value = '';
            currentInput.disabled = true;
            currentSendBtn.disabled = true;

            appendMessage(messageText, 'user-message');

            let success = false;
            
            for (let i = 0; i < apiKeys.length; i++) {
                const activeKey = apiKeys[i];
                
                try {
                    if (i > 0) {
                        appendNotification(`Key swap engaged... processing Fallback #${i}`, 'fallback-warning');
                    }

                    const ai = new GoogleGenAI({ apiKey: activeKey });
                    const response = await ai.models.generateContent({
                        model: 'gemini-2.5-flash',
                        contents: messageText,
                    });

                    appendMessage(response.text, 'ai-message', true);
                    success = true;
                    break; 
                    
                } catch (error) {
                    console.warn(`Position sequence index ${i} failed request execution`, error.message);
                    if (i === apiKeys.length - 1 && !success) {
                        appendMessage(`Execution Interrupted: All verified keys dropped connection. ${error.message}`, 'system-message');
                    }
                }
            }

            currentInput.disabled = false;
            currentSendBtn.disabled = false;
            currentInput.focus();
        }

        function appendNotification(text, className) {
            const notifyDiv = document.createElement('div');
            notifyDiv.className = className;
            notifyDiv.innerText = text;
            currentChatContainer.appendChild(notifyDiv);
            currentChatContainer.scrollTop = currentChatContainer.scrollHeight;
        }

        function appendMessage(text, className, isAI = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.innerText = text;

            if (isAI) {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'msg-actions';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-btn';
                copyBtn.innerText = 'Copy';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(text);
                    copyBtn.innerText = 'Copied!';
                    setTimeout(() => copyBtn.innerText = 'Copy', 2000);
                };
                actionsDiv.appendChild(copyBtn);
                messageDiv.appendChild(actionsDiv);
            }

            currentChatContainer.appendChild(messageDiv);
            currentChatContainer.scrollTop = currentChatContainer.scrollHeight;

            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([messageDiv]).catch((err) => console.log(err.message));
            }
        }
    </script>
</body>
</html>
