<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Screen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f3f4f6;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body>

    <button id="openPipBtn">Open Floating Document Viewer</button>

    <script>
        const openPipBtn = document.getElementById('openPipBtn');

        openPipBtn.addEventListener('click', async () => {
            // Check if the browser supports Document Picture-in-Picture
            if ('documentPictureInPicture' in window) {
                try {
                    // Request a floating always-on-top window
                    const pipWindow = await window.documentPictureInPicture.requestWindow({
                        width: 450,
                        height: 350,
                    });

                    // Insert your document viewer content into the floating window
                    pipWindow.document.body.innerHTML = `
                        <div style="font-family: Arial, sans-serif; padding: 20px;">
                            <h3 style="color: #4f46e5;">Document Viewer</h3>
                            <p>This window uses Chrome's PiP API to stay on top of other screens and applications on ChromeOS!</p>
                        </div>
                    `;

                    // Optional: Copy the main screen's styles to the popup window
                    [...document.styleSheets].forEach((styleSheet) => {
                        try {
                            const cssMimeType = styleSheet.type || 'text/css';
                            const cssSource = [...styleSheet.cssRules].map((rule) => rule.cssText).join('');
                            const style = document.createElement('style');
                            style.type = cssMimeType;
                            style.appendChild(document.createTextNode(cssSource));
                            pipWindow.document.head.appendChild(style);
                        } catch (e) {
                            // Cross-origin stylesheet safety check
                        }
                    });

                } catch (error) {
                    console.error("Failed to open floating window:", error);
                }
            } else {
                alert("Your version of Chrome doesn't fully support the Document PiP API yet. Try Method 1!");
            }
        });
    </script>

</body>
</html>
