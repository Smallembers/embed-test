<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Gem Chat PiP (with Multi-Key Fallback)</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background-color: #121214;
            color: #e3e3e3;
            position: relative;
        }

        #main-app-container {
            display: block;
        }

        .hidden-ui {
            display: none !important;
        }

        #floating-reveal-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            background-color: #2e2e34;
            color: #a1a1aa;
            border: 1px solid #3f3f46;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 9999;
            display: none;
        }
        #floating-reveal-btn:hover {
            color: #ffffff;
            background-color: #2563eb;
            border-color: #3b82f6;
        }

        .header-panel {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        h2 {
            font-weight: 600;
            color: #ffffff;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .pip-trigger-btn {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .pip-trigger-btn:hover {
            background-color: #1ed760;
            transform: scale(1.05);
        }
        .hide-btn {
            background-color: #3f3f46;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .hide-btn:hover {
            background-color: #52525b;
            transform: scale(1.05);
        }

        /* --- Multi-Key Config Box --- */
        .config-box {
            background: #1a1a1e;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2e2e34;
            margin-bottom: 20px;
        }
        .config-box label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #b0b0b5;
        }
        .key-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .key-input-group input {
            flex-grow: 1;
            padding: 10px;
            background-color: #26262b;
            border: 1px solid #3f3f46;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
        }
        .key-input-group button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .key-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .key-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #26262b;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: monospace;
            border: 1px solid #3f3f46;
        }
        .key-item .badge {
            background-color: #3f3f46;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 6px;
        }
        .key-item .badge.primary {
            background-color: #1DB954;
            color: black;
            font-weight: bold;
        }
        .key-item button {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        /* --- Main Chat UI --- */
        #chat-ui-wrapper {
            background: #1a1a1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2e2e34;
            display: flex;
            flex-direction: column;
            height: 450px;
            transition: all 0.15s ease-in-out;
            transform-origin: top left;
        }

        /* Toggled class to drastically compress the visual UI items when minimized */
        .pip-minimized-ui {
            padding: 5px !important;
            height: 100% !important;
            background: #2563eb !important; /* Turns into a solid colored block indicator */
            justify-content: center;
            align-items: center;
        }
        .pip-minimized-ui #chat-container,
        .pip-minimized-ui .input-area {
            display: none !important; /* Hides chat stream/inputs so window looks clean */
        }
        .pip-minimized-ui::before {
            content: "💬 AI";
            font-weight: bold;
            font-size: 16px;
            color: white;
        }

        #chat-container {
            flex-grow: 1;
            border: 1px solid #2e2e34;
            background: #121214;
            padding: 15px;
            overflow-y: auto;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
            position: relative;
        }
        .user-message {
            background-color: #2563eb;
            color: #ffffff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background-color: #2e2e34;
            color: #e3e3e3;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            padding-bottom: 38px;
        }
        
        .msg-actions {
            position: absolute;
            bottom: 6px;
            left: 12px;
            display: flex;
            gap: 8px;
        }
        .action-btn {
            background: #1a1a1e;
            border: 1px solid #3f3f46;
            color: #a1a1aa;
            padding: 3px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
        }
        .action-btn:hover {
            color: #ffffff;
            border-color: #3b82f6;
            background: #2563eb;
        }

        .system-message {
            background-color: transparent;
            color: #ef4444;
            margin: 10px auto;
            text-align: center;
            font-size: 13px;
            border-radius: 0;
            max-width: 100%;
        }

        .fallback-warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px dashed #f59e0b;
            font-size: 12px;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex-grow: 1;
            padding: 14px;
            background-color: #121214;
            border: 1px solid #2e2e34;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
        }
        .input-area button {
            padding: 0 24px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="main-app-container">
        <div class="header-panel">
            <h2>Interactive Gem Chat</h2>
            <div class="btn-group">
                <button id="pip-button" class="pip-trigger-btn">Pop Out Chat Player</button>
                <button id="hide-ui-btn" class="hide-btn">Hide Interface (`)</button>
            </div>
        </div>

        <div class="config-box">
            <label for="newApiKey">Gemini API Keys (Saved locally)</label>
            <div class="key-input-group">
                <input type="password" id="newApiKey" placeholder="Add a new AIzaSy... key">
                <button id="addKeyBtn">Add Key</button>
            </div>
            <ul id="keyList" class="key-list"></ul>
        </div>

        <div id="chat-ui-wrapper" class="tex2jax_process">
            <div id="chat-container"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type a message...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <button id="floating-reveal-btn">Show Chat (`)</button>

    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.run/@google/genai"
        }
      }
    </script>

    <script type="module">
        import { GoogleGenAI } from '@google/genai';

        const mainContainer = document.getElementById('main-app-container');
        const hideUiBtn = document.getElementById('hide-ui-btn');
        const floatingRevealBtn = document.getElementById('floating-reveal-btn');
        const chatWrapper = document.getElementById('chat-ui-wrapper');
        const pipButton = document.getElementById('pip-button');
        const newApiKeyInput = document.getElementById('newApiKey');
        const addKeyBtn = document.getElementById('addKeyBtn');
        const keyListEl = document.getElementById('keyList');
        
        let chatSession = null;
        let currentInput = document.getElementById('userInput');
        let currentSendBtn = document.getElementById('sendBtn');
        let currentChatContainer = document.getElementById('chat-container');

        function toggleUI() {
            if (mainContainer.classList.contains('hidden-ui')) {
                mainContainer.classList.remove('hidden-ui');
                floatingRevealBtn.style.display = 'none';
            } else {
                mainContainer.classList.add('hidden-ui');
                floatingRevealBtn.style.display = 'block';
            }
        }

        hideUiBtn.onclick = (e) => {
            e.stopPropagation();
            toggleUI();
        };

        floatingRevealBtn.onclick = (e) => {
            e.stopPropagation();
            toggleUI();
        };

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
                if (e.key === 'Escape') {
                    document.activeElement.blur();
                }
                return;
            }

            if (e.key === '`') {
                e.preventDefault(); 
                toggleUI();
            }
        });

        let apiKeys = JSON.parse(localStorage.getItem('gemini_api_keys')) || [];

        function saveKeys() {
            localStorage.setItem('gemini_api_keys', JSON.stringify(apiKeys));
            renderKeyList();
        }

        function renderKeyList() {
            keyListEl.innerHTML = '';
            if (apiKeys.length === 0) {
                keyListEl.innerHTML = `<li style="font-size:12px; color:#a1a1aa; text-align:center;">No keys added yet. Add at least one above.</li>`;
                return;
            }
            apiKeys.forEach((key, index) => {
                const li = document.createElement('li');
                li.className = 'key-item';
                
                const maskedKey = key.substring(0, 8) + '...' + key.substring(key.length - 4);
                const badgeText = index === 0 ? '<span class="badge primary">Primary</span>' : `<span class="badge">Fallback #${index}</span>`;
                
                li.innerHTML = `
                    <div>${maskedKey} ${badgeText}</div>
                    <button data-index="${index}" class="delete-key-btn">Remove</button>
                `;
                keyListEl.appendChild(li);
            });
        }

        addKeyBtn.onclick = () => {
            const keyVal = newApiKeyInput.value.trim();
            if (keyVal) {
                if (!apiKeys.includes(keyVal)) {
                    apiKeys.push(keyVal);
                    saveKeys();
                    newApiKeyInput.value = '';
                } else {
                    alert("This key is already in your list!");
                }
            }
        };

        keyListEl.onclick = (e) => {
            if (e.target.classList.contains('delete-key-btn')) {
                const indexToRemove = parseInt(e.target.getAttribute('data-index'));
                apiKeys.splice(indexToRemove, 1);
                chatSession = null;
                saveKeys();
            }
        };

        renderKeyList();

        function setupInputListeners(inputEl, btnEl) {
            inputEl.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
            btnEl.onclick = () => { sendMessage(); };
        }
        setupInputListeners(currentInput, currentSendBtn);

        // --- Document PiP Framework Logic ---
        pipButton.addEventListener('click', async () => {
            if (!('documentPictureInPicture' in window)) {
                alert("Your browser doesn't support interactive Document PiP. Try Chrome or Edge!");
                return;
            }

            try {
                const pipWindow = await window.documentPictureInPicture.requestWindow({
                    width: 450,
                    height: 500,
                });

                [...document.styleSheets].forEach((styleSheet) => {
                    try {
                        const cssMimeType = styleSheet.type || 'text/css';
                        const cssSource = [...styleSheet.cssRules].map((rule) => rule.cssText).join('');
                        const style = document.createElement('style');
                        style.textContent = cssSource;
                        pipWindow.document.head.appendChild(style);
                    } catch (e) {}
                });

                pipWindow.document.body.appendChild(chatWrapper);

                currentInput = pipWindow.document.getElementById('userInput');
                currentSendBtn = pipWindow.document.getElementById('sendBtn');
                currentChatContainer = pipWindow.document.getElementById('chat-container');
                setupInputListeners(currentInput, currentSendBtn);

                // Track minimization toggle state
                let isMinimized = false;

                pipWindow.addEventListener('keydown', (e) => {
                    if (pipWindow.document.activeElement.tagName === 'INPUT' || pipWindow.document.activeElement.tagName === 'TEXTAREA') {
                        if (e.key === 'Escape') {
                            pipWindow.document.activeElement.blur();
                        }
                        return;
                    }

                    if (e.key === '`') {
                        e.preventDefault();
                        isMinimized = !isMinimized;

                        if (isMinimized) {
                            // 1. Instantly compress inner elements to clean badge look
                            chatWrapper.classList.add('pip-minimized-ui');
                            // 2. Shrink browser frame window size to minimum allowed parameters
                            pipWindow.resizeTo(140, 100);
                        } else {
                            // 1. Expand browser window frame size back up
                            pipWindow.resizeTo(450, 500);
                            // 2. Restore default desktop application visual layout styles
                            chatWrapper.classList.remove('pip-minimized-ui');
                        }
                    }
                });

                pipWindow.addEventListener("pagehide", (event) => {
                    chatWrapper.classList.remove('pip-minimized-ui');
                    mainContainer.appendChild(chatWrapper);
                    currentInput = document.getElementById('userInput');
                    currentSendBtn = document.getElementById('sendBtn');
                    currentChatContainer = document.getElementById('chat-container');
                    setupInputListeners(currentInput, currentSendBtn);
                });

            } catch (error) {
                console.error("PiP failed: ", error);
            }
        });

        // --- Chat Core Engine ---
        async function sendMessage() {
            const messageText = currentInput.value.trim();

            if (apiKeys.length === 0) {
                alert("Please add at least one Gemini API key first.");
                return;
            }
            if (!messageText) return;

            currentInput.value = '';
            currentInput.disabled = true;
            currentSendBtn.disabled = true;

            appendMessage(messageText, 'user-message');

            let success = false;
            
            for (let i = 0; i < apiKeys.length; i++) {
                const activeKey = apiKeys[i];
                
                try {
                    if (i > 0) {
                        appendNotification("Primary key failed. Attempting connection via Fallback Key #" + i + "...", 'fallback-warning');
                    }

                    const ai = new GoogleGenAI({ apiKey: activeKey });
                    
                    const response = await ai.models.generateContent({
                        model: 'gemini-2.5-flash',
                        contents: messageText,
                    });

                    appendMessage(response.text, 'ai-message', true);
                    success = true;
                    break;
                    
                } catch (error) {
                    console.warn("API Key position index " + i + " failed: ", error.message);
                    if (i === apiKeys.length - 1 && !success) {
                        appendMessage("Error: All provided API keys failed. Total verification exhausted. last structural error response: " + error.message, 'system-message');
                    }
                }
            }

            currentInput.disabled = false;
            currentSendBtn.disabled = false;
            currentInput.focus();
        }

        function appendNotification(text, className) {
            const notifyDiv = document.createElement('div');
            notifyDiv.className = className;
            notifyDiv.innerText = text;
            currentChatContainer.appendChild(notifyDiv);
            currentChatContainer.scrollTop = currentChatContainer.scrollHeight;
        }

        function appendMessage(text, className, isAI = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = "message " + className;
            messageDiv.innerText = text;

            if (isAI) {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'msg-actions';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-btn';
                copyBtn.innerText = 'Copy';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(text);
                    copyBtn.innerText = 'Copied!';
                    setTimeout(() => copyBtn.innerText = 'Copy', 2000);
                };
                actionsDiv.appendChild(copyBtn);
                messageDiv.appendChild(actionsDiv);
            }

            currentChatContainer.appendChild(messageDiv);
            currentChatContainer.scrollTop = currentChatContainer.scrollHeight;

            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([messageDiv]).catch((err) => console.log(err.message));
            }
        }
    </script>
</body>
</html>
